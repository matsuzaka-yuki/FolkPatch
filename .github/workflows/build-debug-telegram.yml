name: Build Debug + Telegram

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'fpd/**'
      - '.github/workflows/build-debug-telegram.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'fpd/**'
      - '.github/workflows/build-debug-telegram.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    outputs:
      commit_msg: ${{ steps.msg.outputs.text }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android
          override: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get commit message
        id: msg
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "text=${{ github.event.head_commit.message }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "text=PR: ${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          else
            echo "text=📦 FolkPatch Debug Build" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon
        env:
          KEYSTORE_FILE: debug.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android
          ZIG_EXE: /opt/hostedtoolcache/zig/master/x64/zig

      - name: Copy Debug APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/*.apk artifacts/FolkPatch-Debug.apk

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: folkpatch-debug-${{ github.sha }}
          path: artifacts/FolkPatch-Debug.apk
          retention-days: 30

  upload:
    name: Upload to Telegram
    needs: build
    uses: ./.github/workflows/CI_up.yml
    with:
      artifact_name: folkpatch-debug-${{ github.sha }}
      file_name: FolkPatch-Debug.apk
      message: ${{ needs.build.outputs.commit_msg }}
    secrets: inherit
