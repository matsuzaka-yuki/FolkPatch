name: Build APD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apd/**'
      - '.github/workflows/build-apd.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apd/**'
      - '.github/workflows/build-apd.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APD (Rust daemon)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android
          override: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v5
        with:
          path: apd/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build APD
        working-directory: ./apd
        run: |
          cargo ndk -t arm64-v8a build --release
          echo "APD build completed successfully"

      - name: Copy APD binary
        run: |
          mkdir -p artifacts
          cp apd/target/aarch64-linux-android/release/apd artifacts/apd

      - name: Upload APD artifact
        uses: actions/upload-artifact@v7
        with:
          name: apd-${{ github.sha }}
          path: artifacts/apd
          retention-days: 30

      - name: Create Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/apd
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
