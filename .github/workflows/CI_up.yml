name: CI Upload to Telegram

on:
  workflow_call:
    inputs:
      artifact_names:
        required: true
        type: string
        description: 'Comma-separated artifact names to download (supports single or multiple)'
      message:
        required: false
        type: string
        default: 'FolkPatch Build'
        description: 'Telegram message caption'

jobs:
  upload:
    name: Upload to Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.artifact_names }}
          path: artifacts
          merge-multiple: true

      - name: Send to Telegram
        run: |
          FILES=$(find artifacts -type f | sort)
          FILE_COUNT=$(echo "$FILES" | grep -c .)
          
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::No files found in artifacts"
            exit 1
          fi
          
          CAPTION="${{ inputs.message }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          
          if [ "$FILE_COUNT" -eq 1 ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F "document=@$FILES" \
              -F "caption=${CAPTION}" \
              -F "parse_mode=Markdown"
          else
            MEDIA_JSON="["
            FIRST=true
            while IFS= read -r f; do
              if [ "$FIRST" = true ]; then
                MEDIA_JSON+="{\"type\":\"document\",\"media\":\"attach://$(basename $f)\",\"caption\":\"${CAPTION}\",\"parse_mode\":\"Markdown\"}"
                FIRST=false
              else
                MEDIA_JSON+=",{\"type\":\"document\",\"media\":\"attach://$(basename $f)\"}"
              fi
            done <<< "$FILES"
            MEDIA_JSON+="]"
            
            CURL_CMD="curl -s -X POST \"https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMediaGroup\" \
              -F \"chat_id=${{ secrets.TELEGRAM_CHAT_ID }}\" \
              -F \"media=${MEDIA_JSON}\""
            
            while IFS= read -r f; do
              CURL_CMD+=" -F \"$(basename $f)=@$f\""
            done <<< "$FILES"
            
            eval "$CURL_CMD"
          fi
